<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Font Awesome actualizado -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Nombre del archivo corregido aquí -->
    <link rel="stylesheet" href="resources/css/styles.css">
    <title>Empanadas Pepe</title>
</head>

<body>
    <div class="contenedorPrincipal">
        <header>
            <div class="degradado"></div>
            <div class="textoBienvenida">
                <h1>¡Bienvenidxs a Empanadas Pepe!</h1>
                <p>Disfruta de nuestras deliciosas empanadas caseras.</p>
            </div>
            <div class="buscador">
                <i class="fa-solid fa-location-dot"></i>
                <input type="text" placeholder="Buscá tu restaurante">
                <button class="fa-solid fa-magnifying-glass"></button>
            </div>
        </header>

        <main>
            <section class="categorias">
                <a href="#" class="item-cate">
                    <i class="fa-solid fa-pizza-slice"></i>
                    <span>Pizza</span>
                </a>
                <a href="#" class="item-cate">
                    <i class="fa-solid fa-hamburger"></i>
                    <span>Burguers</span>
                </a>
                <a href="#" class="item-cate">
                    <i class="fa-solid fa-coffee"></i>
                    <span>Coffee</span>
                </a>
                <a href="#" class="item-cate">
                    <i class="fa-solid fa-fish"></i>
                    <span>Fish</span>
                </a>
                <a href="#" class="item-cate">
                    <i class="fa-solid fa-ice-cream"></i>
                    <span>Ice-Cream</span>
                </a>
                <a href="#" class="item-cate">
                    <i class="fa-solid fa-hotdog"></i>
                    <span>Hotdog</span>
                </a>
            </section>
            <section class="resto"></section>
        </main>
    </div>
</body>
</html>
